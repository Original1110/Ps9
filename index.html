<!DOCTYPE html>
<html manifest="./PSFree.manifest">
<head>
<meta charset="UTF-8">
<title>PSFree</title>

<!-- 🔹 إخفاء القائمة -->
<style>
.floating-menu {
  display: none !important;
}
</style>

<script>
// 🔹 Auto Jailbreak
window.onload = function () {
  setTimeout(function () {
    document.getElementById("jailbreak").click();
  }, 2000);
};

// 🔹 شاشة سوداء
function showBlackScreen() {
  document.getElementById("black-screen").style.display = "block";
}

// 🔹 كاش (كما هو)
function DLProgress(e){
  Percent=(Math.round(e.loaded / e.total * 100));
  document.title="Installing offline cache: " + Percent + "%";
}

function DisplayCacheProgress(){
  setTimeout(function(){
    document.title="Cache Success !";
  },1000);
  setTimeout(function(){
    window.location.href = document.referrer;
  },3000);
}

window.applicationCache.addEventListener("progress",DLProgress,false);
window.applicationCache.oncached=function(e){DisplayCacheProgress();};
window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
</script>

<link rel='stylesheet' href='./css/index.css'>
</head>

<body>

<!-- 🔹 الشاشة السوداء -->
<div id="black-screen" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  font-size:28px;
  text-align:center;
  padding-top:20%;
  z-index:9999;">
  اضغط على زر PS للخروج
</div>

<!-- 🔹 القائمة (مخفية) -->
<div class="floating-menu">
  <button onclick="showpayloads()">Payloads</button>
  <button id="generate-cache-btn">Force-Cache</button>
  <button id="update-exploit">Update-Exploit</button>
  <button onclick="showsettings()">Settings</button>
  <button onclick="showabout()">About</button>
</div>

<div class="header">
  <div class="header-title" id="header-title">PSFree</div>
</div>

<pre id="update-results" style="white-space: pre-wrap; margin-top: 10px;"></pre>

<h2 id="PS4FW">PS4 FW: 0.00 | Compatible</h2>

<div id="jailbreak-page">
  <div class="center-btn-wrap">
    <button id="jailbreak" class="ps-btn">Jailbreak</button>
  </div>

  <div class="loader" id="loader" style="display: none;">
    <div class="loader-circle"></div>
  </div>
</div>

<!-- باقي الصفحات كما هي -->
<div id="payloads-page" style="display: none;"></div>

<div id="DebugConsole">
  <h3>Debug Console</h3>
  <div class="console" style="padding: 20px;">
    <pre id='console'></pre>
  </div>
</div>

<!-- About -->
<div class="overlay" id="overlay-popup"></div>
<div class="popup" id="about-popup">
  <h2>About PSFree</h2>
  <p>Version: 1.5.1</p>
  <button onclick="closeabout()" class="close-btn"></button>
</div>

<!-- Settings -->
<div class="popup" id="settings-popup">
  <h2>Settings PSFree</h2>
  <button onclick="closesettings()" class="close-btn"></button>
</div>

<script src='./js/index.js'></script>

<script>
// 🔹 عرض الشاشة السوداء بعد نجاح الجيلبريك (حل مؤقت بالتايمر)
document.getElementById("jailbreak").addEventListener("click", function () {
  setTimeout(function () {
    showBlackScreen();
  }, 8000);
});
</script>

</body>
</html>
